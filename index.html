<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Portfolio of Gulshan Singh, Entrepreneur & Visionary.">
    <title>Gulshan Singh | Entrepreneur & Visionary</title>
    <link rel="icon" type="image/png" href="fevicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@700&family=Inter:wght@400;500;600;700;900&display=swap"
        rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">

    <style>
        :root {
            --bg-color-1: #0d0f12;
            --bg-color-2: #16181b;
            --text-color: #ffffff;
            --text-muted: #8b8d91;
            --accent-color-1: #e61919;
            --accent-color-2: #b31010;
            --accent-glow: rgba(230, 25, 25, 0.4);

            /* Cinematic Blue */
            --blue-1: #00b4ff;
            --blue-2: #0066cc;
            --blue-glow: rgba(0, 180, 255, 0.55);
            --blue-deep: rgba(0, 120, 255, 0.3);

            --font-main: 'Inter', sans-serif;
            --font-display: 'Chakra Petch', sans-serif;
            --transition-smooth: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg-color-1);
            color: var(--text-color);
            font-family: var(--font-main);
            min-height: 100vh;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 50% 50%, var(--bg-color-2) 0%, var(--bg-color-1) 100%);
            transition: background-image 1.2s ease;
        }

        body.cinematic-mode {
            background-image: radial-gradient(circle at 50% 70%, rgba(0, 40, 90, 0.7) 0%, var(--bg-color-1) 70%);
        }

        /* ==================== NAVIGATION ==================== */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.8rem 4rem;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: linear-gradient(180deg, rgba(13, 15, 18, 0.95) 0%, rgba(13, 15, 18, 0) 100%);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 2rem;
            animation: fadeInDown 1s ease forwards;
            opacity: 0;
        }

        .logo {
            font-weight: 700;
            font-size: 1.15rem;
            line-height: 1.1;
            text-transform: capitalize;
            letter-spacing: -0.02em;
            cursor: pointer;
            transition: var(--transition-smooth);
        }

        .logo:hover {
            color: var(--accent-color-1);
        }

        body.cinematic-mode .logo:hover {
            color: var(--blue-1);
        }

        .role-title {
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 500;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 2.5rem;
            animation: fadeInDown 1s ease 0.2s forwards;
            opacity: 0;
        }

        .nav-links {
            display: flex;
            gap: 1.8rem;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.88rem;
            font-weight: 500;
            transition: var(--transition-smooth);
            cursor: pointer;
            position: relative;
        }

        .nav-link::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--accent-color-1);
            transition: width 0.3s ease;
            border-radius: 2px;
        }

        body.cinematic-mode .nav-link::after {
            background: var(--blue-1);
        }

        .nav-link:hover::after {
            width: 100%;
        }

        .nav-link i.ri-checkbox-blank-circle-line {
            font-size: 0.4rem;
            transition: transform 0.3s ease;
        }

        .nav-link:hover {
            color: var(--text-color);
        }

        .nav-link:hover i {
            transform: scale(1.5);
            color: var(--accent-color-1);
        }

        body.cinematic-mode .nav-link:hover i {
            color: var(--blue-1);
        }

        .social-icons {
            display: flex;
            gap: 1rem;
        }

        .social-icon {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 1.1rem;
            transition: var(--transition-smooth);
            display: inline-block;
        }

        .social-icon:hover {
            color: var(--text-color);
            transform: scale(1.2) translateY(-2px);
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.4);
        }

        /* Mobile hamburger (hidden by default) */
        .mobile-menu-btn {
            display: none;
            background: none;
            border: none;
            color: var(--text-color);
            font-size: 1.5rem;
            cursor: pointer;
            z-index: 101;
        }

        /* ==================== HERO SECTION ==================== */
        .hero {
            position: relative;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Quote */
        .quote-container {
            position: absolute;
            left: 4.5rem;
            top: 28%;
            max-width: 400px;
            animation: slideInLeft 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) 0.4s forwards;
            opacity: 0;
            z-index: 5;
        }

        .quote-mark {
            font-family: var(--font-main);
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--text-muted);
            line-height: 0;
            margin-bottom: 1.8rem;
            opacity: 0.8;
            position: relative;
            top: 10px;
            transition: color 1s ease;
        }

        body.cinematic-mode .quote-mark {
            color: var(--blue-1);
        }

        .quote-text {
            font-size: clamp(1rem, 1.6vw, 1.4rem);
            font-weight: 800;
            line-height: 1.35;
            text-transform: uppercase;
            letter-spacing: 0.03em;
            margin-bottom: 1.2rem;
        }

        .quote-author {
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 500;
        }

        /* Number 20 */
        .large-number {
            position: absolute;
            right: 5rem;
            top: 22%;
            font-size: clamp(7rem, 12vw, 14rem);
            font-weight: 900;
            line-height: 1;
            letter-spacing: -0.05em;
            color: var(--text-color);
            animation: slideInRight 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) 0.6s forwards;
            opacity: 0;
            z-index: 5;
            text-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
            transition: transform 0.2s ease-out;
        }

        /* ==================== MASSIVE TITLE (Bottom – Behind Person) ==================== */
        .massive-title-container {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            width: 100%;
            text-align: center;
            z-index: 4; /* Brought in front of person-image for blend effect */
            pointer-events: none;
            line-height: 0;
        }

        .massive-title {
            font-family: var(--font-display);
            font-size: 11.5vw; /* Perfectly fits the 13 chars across any width */
            font-weight: 400;
            color: var(--accent-color-1);
            text-transform: uppercase;
            line-height: 0.85;
            letter-spacing: 0.02em;
            margin: 0; /* removed margin 5 to help with alignment */
            white-space: nowrap;
            display: inline-block;
            pointer-events: auto;
            cursor: default;

            /* Visual enhancement */
            text-shadow: 0 15px 40px var(--accent-glow);

            /* Initial state for animation */
            opacity: 0;
            transform: translateY(80px);
            animation: titleRise 1.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.8s forwards;

            /* Text gradient */
            background: linear-gradient(180deg, var(--accent-color-1) 0%, var(--accent-color-2) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;

            /* Blend mode for the Alex Graham effect */
            mix-blend-mode: difference;

            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275),
                letter-spacing 0.4s ease,
                text-shadow 0.8s ease;
        }

        /* Hover animation on massive title */
        .massive-title:hover {
            transform: scale(1.03) translateY(0);
            letter-spacing: 0.06em;
        }

        /* Cinematic Mode for Title */
        body.cinematic-mode .massive-title {
            background: linear-gradient(180deg, var(--blue-1) 0%, var(--blue-2) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 15px 60px var(--blue-glow),
                0 0 120px var(--blue-deep);
        }

        /* ==================== PERSON IMAGE (In Front of Title) ==================== */
        .person-image {
            position: absolute;
            bottom: 0;
            left: 50%;
            height: 88vh;
            max-height: 900px;
            max-width: 90vw;
            object-fit: contain;
            z-index: 3;
            opacity: 0;
            transform: translate(-50%, 120px);
            animation: emerge 1.5s cubic-bezier(0.2, 0.8, 0.2, 1) 0.9s forwards;
            cursor: pointer;
            filter: drop-shadow(0 0 0px transparent);
            transition: filter 1s ease, transform 0.3s ease;
            transform-origin: bottom center;
        }

        .person-image:hover {
            transform: translate(-50%, 0) scale(1.01);
        }

        body.cinematic-mode .person-image {
            filter:
                drop-shadow(0 0 25px var(--blue-glow)) drop-shadow(0 0 60px var(--blue-deep)) drop-shadow(0 0 120px rgba(0, 100, 255, 0.25));
        }

        /* ==================== PORTFOLIO BUTTONS ==================== */
        .portfolio-buttons {
            position: absolute;
            bottom: 3.5rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 1.2rem;
            z-index: 6;
            animation: fadeInUp 1s ease 1.4s forwards;
            opacity: 0;
        }

        .portfolio-btn {
            padding: 0.7rem 1.8rem;
            border: 1.5px solid rgba(255, 255, 255, 0.2);
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-color);
            font-family: var(--font-main);
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            cursor: pointer;
            text-decoration: none;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
        }

        .portfolio-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 50px;
            background: linear-gradient(135deg, var(--accent-color-1), var(--accent-color-2));
            opacity: 0;
            transition: opacity 0.35s ease;
            z-index: -1;
        }

        .portfolio-btn:hover {
            border-color: var(--accent-color-1);
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(230, 25, 25, 0.25);
        }

        .portfolio-btn:hover::before {
            opacity: 1;
        }

        /* Cinematic mode buttons */
        body.cinematic-mode .portfolio-btn::before {
            background: linear-gradient(135deg, var(--blue-1), var(--blue-2));
        }

        body.cinematic-mode .portfolio-btn:hover {
            border-color: var(--blue-1);
            box-shadow: 0 8px 30px var(--blue-glow);
        }

        /* Particle element */
        .particle {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            z-index: 4;
        }

        /* ==================== ANIMATIONS ==================== */
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(25px);
            }

            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-60px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(60px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes titleRise {
            0% {
                opacity: 0;
                transform: translateY(80px);
                filter: blur(10px);
            }

            60% {
                filter: blur(0);
            }

            100% {
                opacity: 1;
                transform: translateY(0);
                filter: blur(0);
            }
        }

        @keyframes emerge {
            0% {
                opacity: 0;
                transform: translate(-50%, 120px);
            }

            100% {
                opacity: 1;
                transform: translate(-50%, 0);
            }
        }

        /* ==================== RESPONSIVE: LARGE DESKTOP (1440+) ==================== */
        @media (min-width: 1440px) {
            nav {
                padding: 2rem 5rem;
            }

            .quote-container {
                left: 5rem;
            }

            .large-number {
                right: 5.5rem;
            }
        }

        /* ==================== RESPONSIVE: NARROW DESKTOP ==================== */
        @media (max-width: 1200px) {
            .nav-links { gap: 1.2rem; }
            .nav-link { font-size: 0.82rem; }
            .nav-right { gap: 2rem; }
        }

        /* ==================== RESPONSIVE: TABLET ==================== */
        @media (max-width: 1024px) {
            nav { padding: 1.4rem 2rem; }
            .nav-right { gap: 1.5rem; }
            .nav-links { gap: 1rem; }
            .nav-link { font-size: 0.8rem; }
            .role-title { font-size: 0.78rem; }

            .quote-container { left: 2rem; top: 24%; max-width: 300px; }
            .quote-text { font-size: clamp(0.85rem, 1.4vw, 1.1rem); }

            .large-number { right: 2rem; top: 20%; font-size: 8rem; }

            .person-image { height: 78vh; }

            .portfolio-buttons { bottom: 2rem; }

            .portfolio-btn {
                padding: 0.6rem 1.4rem;
                font-size: 0.78rem;
            }
        }

        /* ==================== RESPONSIVE: MOBILE ==================== */
        @media (max-width: 768px) {

            /* Nav: hamburger layout */
            nav {
                padding: 1rem 1.5rem;
                flex-wrap: wrap;
            }

            .nav-left {
                width: 100%;
                justify-content: space-between;
                align-items: center;
            }

            .role-title {
                display: none;
            }

            .mobile-menu-btn {
                display: block;
            }

            .nav-right {
                width: 100%;
                flex-direction: column;
                align-items: flex-start;
                gap: 1rem;
                max-height: 0;
                overflow: hidden;
                transition: max-height 0.5s cubic-bezier(0.16, 1, 0.3, 1),
                    padding 0.4s ease;
                padding: 0;
                opacity: 1;
                animation: none;
            }

            .nav-right.open {
                max-height: 300px;
                padding-top: 1rem;
            }

            .nav-links {
                flex-direction: column;
                gap: 0.7rem;
            }

            .nav-link {
                font-size: 0.9rem;
            }

            .social-icons {
                gap: 1.2rem;
            }

            /* Hero mobile */
            .hero {
                height: 100svh;
            }

            .quote-container {
                left: 1.5rem;
                top: 12%;
                max-width: 52%;
            }

            .quote-mark {
                font-size: 1.8rem;
                margin-bottom: 0.8rem;
            }

            .quote-text {
                font-size: 0.82rem;
                margin-bottom: 0.6rem;
                line-height: 1.3;
            }

            .quote-author {
                font-size: 0.75rem;
            }

            .large-number {
                right: 1.5rem;
                top: 11%;
                font-size: 4.5rem;
            }

            /* Person image: taller ratio on mobile portrait */
            .person-image {
                height: 68vh;
                max-height: none;
            }

            /* Title at the bottom */
            .massive-title {
                font-size: 11.5vw;
                mix-blend-mode: overlay;
            }

            /* Portfolio buttons */
            .portfolio-buttons {
                bottom: 1.8rem;
                gap: 0.5rem;
                flex-wrap: nowrap;
                justify-content: center;
                width: auto;
            }

            .portfolio-btn {
                padding: 0.55rem 1.3rem;
                font-size: 0.7rem;
                backdrop-filter: blur(20px);
                -webkit-backdrop-filter: blur(20px);
                background: rgba(0, 0, 0, 0.45);
                border: 1.5px solid rgba(255, 255, 255, 0.3);
            }
        }

        /* ==================== RESPONSIVE: SMALL PHONES (≤420px) ==================== */
        @media (max-width: 420px) {
            .quote-container {
                top: 11%;
                max-width: 58%;
            }

            .quote-mark {
                font-size: 1.5rem;
                margin-bottom: 0.6rem;
            }

            .quote-text {
                font-size: 0.75rem;
            }

            .quote-author {
                font-size: 0.7rem;
            }

            .large-number {
                font-size: 3.5rem;
                top: 10%;
            }

            .person-image {
                height: 62vh;
            }

            .massive-title {
                font-size: 11.5vw;
            }

            .portfolio-buttons {
                bottom: 1.2rem;
                gap: 0.4rem;
            }

            .portfolio-btn {
                padding: 0.45rem 0.9rem;
                font-size: 0.65rem;
            }
        }

        /* ==================== RESPONSIVE: VERY SMALL PHONES (≤360px) ==================== */
        @media (max-width: 360px) {
            nav {
                padding: 0.8rem 1rem;
            }

            .logo {
                font-size: 1rem;
            }

            .quote-container {
                top: 10%;
                max-width: 60%;
                left: 1rem;
            }

            .quote-text {
                font-size: 0.7rem;
            }

            .large-number {
                font-size: 3rem;
                right: 1rem;
            }

            .person-image {
                height: 58vh;
            }

            .massive-title {
                font-size: 11.5vw;
            }

            .portfolio-buttons {
                bottom: 0.8rem;
            }

            .portfolio-btn {
                padding: 0.4rem 0.75rem;
                font-size: 0.6rem;
            }
        }

        /* ==================== LANDSCAPE PHONES ==================== */
        @media (max-height: 500px) and (orientation: landscape) {
            .hero {
                height: 100vh;
            }

            .quote-container {
                top: 32%;
                left: 2rem;
                max-width: 250px;
            }

            .quote-mark {
                font-size: 1.2rem;
                margin-bottom: 0.4rem;
            }

            .quote-text {
                font-size: 0.65rem;
                margin-bottom: 0.4rem;
                line-height: 1.25;
            }

            .quote-author {
                font-size: 0.6rem;
            }

            .large-number {
                font-size: 3.5rem;
                top: 28%;
                right: 2rem;
            }

            .person-image {
                height: 88vh;
            }

            .massive-title {
                font-size: 10vw;
            }

            .portfolio-buttons {
                bottom: 0.4rem;
            }

            .portfolio-btn {
                padding: 0.3rem 0.8rem;
                font-size: 0.6rem;
            }
        }

        /* ==================== TABLET LANDSCAPE / iPAD ==================== */
        @media (min-width: 769px) and (max-width: 1024px) and (orientation: landscape) {
            .quote-container {
                top: 28%;
                left: 2.5rem;
                max-width: 280px;
            }

            .large-number {
                font-size: 7rem;
                top: 24%;
            }

            .person-image {
                height: 85vh;
            }

            .massive-title {
                font-size: 13vw;
                mix-blend-mode: overlay;
            }
        }

        /* ==================== iPAD PRO / LARGE TABLET ==================== */
        @media (min-width: 1024px) and (max-width: 1200px) and (min-height: 1000px) {
            .quote-container {
                top: 22%;
                max-width: 380px;
            }

            .large-number {
                font-size: 10rem;
                top: 18%;
            }

            .person-image {
                height: 75vh;
            }

            .massive-title {
                font-size: 12vw;
                mix-blend-mode: overlay;
            }

            .portfolio-buttons {
                bottom: 3rem;
            }
        }
    </style>
</head>

<body>

    <nav>
        <div class="nav-left">
            <div class="logo">
                Gulshan<br>Singh
            </div>
            <div class="role-title">
                Entrepreneur & Visionary
            </div>
            <button class="mobile-menu-btn" id="menuBtn" aria-label="Toggle Menu">
                <i class="ri-menu-line"></i>
            </button>
        </div>

        <div class="nav-right" id="navRight">
            <div class="nav-links">
                <a class="nav-link" href="#about">
                    <i class="ri-checkbox-blank-circle-line"></i> About Me
                </a>
                <a class="nav-link" href="#projects">
                    <i class="ri-checkbox-blank-circle-line"></i> Projects
                </a>
                <a class="nav-link" href="#skills">
                    <i class="ri-checkbox-blank-circle-line"></i> Skills
                </a>
                <a class="nav-link" href="#partners">
                    <i class="ri-checkbox-blank-circle-line"></i> Partners
                </a>
                <a class="nav-link" href="#collab">
                    <i class="ri-checkbox-blank-circle-line"></i> Collaboration
                </a>
            </div>

            <div class="social-icons">
                <a href="#" class="social-icon" aria-label="TikTok"><i class="ri-tiktok-fill"></i></a>
                <a href="#" class="social-icon" aria-label="Instagram"><i class="ri-instagram-line"></i></a>
                <a href="#" class="social-icon" aria-label="Spotify"><i class="ri-spotify-fill"></i></a>
                <a href="#" class="social-icon" aria-label="YouTube"><i class="ri-youtube-fill"></i></a>
                <a href="#" class="social-icon" aria-label="X"><i class="ri-twitter-x-line"></i></a>
            </div>
        </div>
    </nav>

    <section class="hero">
        <div class="quote-container">
            <div class="quote-mark">"</div>
            <div class="quote-text">
                EMBRACE THE JOURNEY,<br>
                ACHIEVE THE IMPOSSIBLE.
            </div>
            <div class="quote-author">Gulshan Singh</div>
        </div>

        <div class="large-number">20</div>

        <!-- Massive title anchored to the bottom, behind the person -->
        <div class="massive-title-container">
            <h1 class="massive-title">GULSHAN SINGH</h1>
        </div>

        <!-- Person image in front of the title -->
        <img id="person-image" class="person-image" src="./Me.png"
            alt="Gulshan Singh Portrait">

        <!-- Portfolio Action Buttons -->
        <div class="portfolio-buttons">
            <a href="#about" class="portfolio-btn" id="btn-about">About Me</a>
            <a href="#projects" class="portfolio-btn" id="btn-projects">Projects</a>
            <a href="#skills" class="portfolio-btn" id="btn-skills">Skills</a>
        </div>
    </section>

    <script>
        // --- Element References ---
        const title = document.querySelector('.massive-title');
        const number = document.querySelector('.large-number');
        const personImg = document.getElementById('person-image');
        const menuBtn = document.getElementById('menuBtn');
        const navRight = document.getElementById('navRight');

        // --- Mobile Hamburger Menu Toggle ---
        menuBtn.addEventListener('click', () => {
            navRight.classList.toggle('open');
            const icon = menuBtn.querySelector('i');
            if (navRight.classList.contains('open')) {
                icon.className = 'ri-close-line';
            } else {
                icon.className = 'ri-menu-line';
            }
        });

        // --- Mouse Parallax (Desktop only) ---
        document.addEventListener('mousemove', (e) => {
            if (window.innerWidth <= 768) return;
            const xAxis = (window.innerWidth / 2 - e.pageX) / 70;
            const yAxis = (window.innerHeight / 2 - e.pageY) / 70;
            title.style.transform = `translate(${xAxis}px, ${yAxis}px)`;
            number.style.transform = `translate(${xAxis * 1.8}px, ${yAxis * 1.8}px)`;
        });

        document.addEventListener('mouseleave', () => {
            title.style.transform = `translate(0px, 0px)`;
            number.style.transform = `translate(0px, 0px)`;
        });

        // --- Cinematic Blue Toggle on Image Click ---
        personImg.addEventListener('click', () => {
            document.body.classList.toggle('cinematic-mode');
            if (document.body.classList.contains('cinematic-mode')) {
                emitParticles(personImg);
            }
        });

        // --- Particle Burst System ---
        function emitParticles(el) {
            const rect = el.getBoundingClientRect();
            const count = 45;

            const cx = rect.left + rect.width / 2;
            const cy = rect.top + rect.height / 2;
            const rx = rect.width * 0.32;
            const ry = rect.height * 0.44;

            for (let i = 0; i < count; i++) {
                const dot = document.createElement('div');
                dot.classList.add('particle');
                document.body.appendChild(dot);

                const angle = Math.random() * Math.PI * 2;

                const sx = cx + Math.cos(angle) * rx;
                const sy = cy + Math.sin(angle) * ry;

                const dist = 30 + Math.random() * 60;
                const dx = Math.cos(angle) * dist;
                const dy = Math.sin(angle) * dist;

                const size = 3 + Math.random() * 4;
                dot.style.width = size + 'px';
                dot.style.height = size + 'px';
                dot.style.left = sx + 'px';
                dot.style.top = sy + 'px';

                const colors = ['#00b4ff', '#66d4ff', '#99e0ff', '#ffffff'];
                const color = colors[Math.floor(Math.random() * colors.length)];
                dot.style.background = color;
                dot.style.boxShadow = `0 0 ${6 + Math.random() * 8}px ${color}`;

                const duration = 900 + Math.random() * 700;
                const anim = dot.animate([
                    {
                        transform: 'translate(-50%, -50%) scale(0)',
                        opacity: 0
                    },
                    {
                        transform: 'translate(-50%, -50%) scale(1.4)',
                        opacity: 1,
                        offset: 0.2
                    },
                    {
                        transform: `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px)) scale(0)`,
                        opacity: 0
                    }
                ], {
                    duration,
                    easing: 'cubic-bezier(0.22, 1, 0.36, 1)'
                });

                anim.onfinish = () => dot.remove();
            }
        }
    </script>
</body>

</html>
